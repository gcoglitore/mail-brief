<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/icon-180.png">
<title>Mail Brief</title>
<style>
  :root {
    --bg: #0b0f14; --panel: #121922; --panel2: #0f141c; --line: #1f2a37;
    --text: #e6edf3; --dim: #8b98a5; --faint: #5c6773;
    --gold: #d4a843; --red: #e0564f; --blue: #4a86e8; --green: #3fb37f;
    --list-w: 500px; /* width of the list column in the desktop two-pane layout */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 14px 60px; }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 2px 14px; border-bottom: 2px solid var(--gold); margin-bottom: 14px;
  }
  h1 { font-size: 20px; letter-spacing: 3px; font-weight: 800; }
  h1 span { color: var(--gold); }
  #hdrRight { display: flex; align-items: center; gap: 8px; }
  #updated { font-size: 12px; color: var(--dim); }
  #updated.stale { color: var(--red); }
  #updateBtn {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line);
    background: var(--panel); color: var(--gold); font-size: 16px; cursor: pointer;
    line-height: 1; padding: 0;
  }
  #updateBtn.spin { animation: rot 1s linear infinite; opacity: .7; }
  @keyframes rot { to { transform: rotate(360deg); } }
  #netBar {
    display: none; margin-bottom: 12px; padding: 9px 13px; border-radius: 10px;
    font-size: 13px; background: var(--panel2); border: 1px solid var(--line); color: var(--gold);
  }
  /* Command-center daily brief */
  #briefStrip { display: none; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .statCell { flex: 1 1 0; min-width: 74px; padding: 11px 12px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--faint); }
  .statCell .statN { font-size: 22px; font-weight: 800; line-height: 1.1; color: var(--text); }
  .statCell .statL { font-size: 11px; color: var(--dim); margin-top: 3px; letter-spacing: .3px; }
  .statCell.tone-gold { border-left-color: var(--gold); }
  .statCell.tone-gold  .statN { color: var(--gold); }
  .statCell.tone-blue  { border-left-color: var(--blue); }
  .statCell.tone-red   { border-left-color: var(--red); }
  .statCell.tone-red   .statN { color: var(--red); }
  .statCell.tone-gray  { border-left-color: var(--faint); }
  /* Undo / sync toast */
  #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(16px);
    opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease;
    display: flex; align-items: center; gap: 13px; max-width: 92vw; z-index: 40;
    padding: 11px 16px; border-radius: 12px; font-size: 14px; color: var(--text);
    background: var(--panel); border: 1px solid var(--line); box-shadow: 0 10px 34px rgba(0,0,0,.5); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #toast .tState { width: 9px; height: 9px; border-radius: 50%; flex: none; background: var(--faint); }
  #toast.state-ok .tState { background: var(--green); }
  #toast.state-send .tState { background: var(--gold); animation: tpulse 1s infinite; }
  #toast.state-fail .tState { background: var(--red); }
  #toast.state-offline .tState { background: var(--faint); }
  @keyframes tpulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  #toast .tUndo { color: var(--gold); font-weight: 800; cursor: pointer; background: none;
    border: 0; font-size: 14px; padding: 2px 4px; }

  #keyScreen { display: none; text-align: center; padding: 80px 20px; }
  #keyScreen h2 { font-size: 17px; margin-bottom: 6px; }
  #keyScreen p { color: var(--dim); font-size: 13px; margin-bottom: 22px; }
  #keyInput {
    width: 100%; max-width: 360px; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--panel); color: var(--text);
    font-size: 16px; text-align: center; letter-spacing: 1px;
  }
  #keyBtn {
    margin-top: 14px; padding: 12px 34px; border: 0; border-radius: 10px;
    background: var(--gold); color: #14100a; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  #keyErr { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

  #chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--panel); color: var(--dim); font-size: 13px; cursor: pointer;
  }
  .chip.on { background: var(--gold); border-color: var(--gold); color: #14100a; font-weight: 700; }

  .secHead {
    display: flex; align-items: center; gap: 8px; margin: 20px 2px 10px;
    font-size: 12px; font-weight: 800; letter-spacing: 2px; color: var(--dim);
  }
  .secHead .dot { width: 8px; height: 8px; border-radius: 50%; }
  .count { color: var(--faint); font-weight: 400; }
  .clearAllBtn { margin-left: auto; padding: 3px 11px; border-radius: 7px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--green); font-size: 11px; font-weight: 700;
    letter-spacing: .5px; cursor: pointer; }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px; display: block; color: inherit;
    text-decoration: none;
  }
  .card.attn { border-left: 3px solid var(--red); }
  .row1 { display: flex; align-items: center; gap: 8px; }
  .acct {
    font-size: 10px; font-weight: 800; letter-spacing: 1px; padding: 2px 7px;
    border-radius: 5px; background: var(--panel2); border: 1px solid var(--line); color: var(--gold);
    white-space: nowrap;
  }
  .from { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unread { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex: none; }
  .ago { margin-left: auto; color: var(--faint); font-size: 12px; white-space: nowrap; }
  .stalePill { margin-left: 8px; font-size: 9px; font-weight: 800; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 5px; background: rgba(224,86,79,.15); color: var(--red);
    border: 1px solid rgba(224,86,79,.4); white-space: nowrap; }
  .subj { font-size: 14px; margin-top: 4px; }
  .snip { font-size: 12.5px; color: var(--dim); margin-top: 3px;
          display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .actionSum { font-size: 13px; color: var(--gold); font-weight: 600; margin-top: 4px;
    display: flex; align-items: baseline; gap: 6px; }
  .actionSum .actionDot { font-size: 11px; opacity: .8; }
  .expandHint { color: var(--faint); font-size: 11px; margin-top: 5px; }

  /* full-screen email reader */
  #reader {
    display: none; position: fixed; inset: 0; z-index: 5; background: var(--bg);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #readerInner { max-width: 760px; margin: 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom)); }
  #readerBack {
    background: none; border: 0; color: var(--gold); font-size: 16px; font-weight: 700;
    cursor: pointer; padding: 12px 14px 12px 0; letter-spacing: .5px; min-height: 44px;
  }
  #readerMeta { display: flex; align-items: center; gap: 8px; margin: 6px 0 4px; }
  #readerSubject { font-size: 18px; font-weight: 700; line-height: 1.3; margin: 6px 0 14px; }
  #readerBody {
    white-space: pre-wrap; font-size: 14.5px; line-height: 1.55; word-break: break-word;
    border-top: 1px solid var(--line); padding-top: 14px;
  }
  #readerActions { display: flex; gap: 14px; align-items: center; margin: 18px 0 8px; }
  .openLink { color: var(--blue); font-size: 13px; text-decoration: none; }
  #readerDone { color: var(--green); border-color: var(--green); }
  #readerDraft { color: var(--gold); border-color: var(--gold); }
  #composeSuggest { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .sugChip { text-align: left; padding: 8px 12px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 13px; cursor: pointer; line-height: 1.4; }
  .sugChip:hover { border-color: var(--gold); }
  .sugNote { font-size: 12px; color: var(--gold); padding: 2px; }
  .sugErr { font-size: 12px; color: var(--red); padding: 2px; }
  .toneChips { display: flex; flex-wrap: wrap; gap: 6px; }
  .toneChip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .toneChip:hover { border-color: var(--gold); }
  .toneChip.on { background: var(--gold); border-color: var(--gold); color: #14100a; }
  .toneChip.custom { color: var(--dim); }
  #composeWarn { display: none; margin: 8px 0 0; padding: 8px 11px; border-radius: 9px; font-size: 12.5px;
    background: rgba(224,86,79,.12); border: 1px solid rgba(224,86,79,.45); color: var(--red); font-weight: 600; }
  #aiDisclosure { font-size: 10.5px; color: var(--faint); margin-top: 10px; text-align: center; }
  .fyi .subj { color: var(--dim); }
  .fyi { opacity: .92; }

  #junkBar {
    background: var(--panel2); border: 1px dashed var(--line); border-radius: 12px;
    padding: 11px 14px; color: var(--dim); font-size: 13px; cursor: pointer;
  }
  #junkList { display: none; margin-top: 8px; }
  #junkList .card { opacity: .65; }

  .replyBtn {
    margin-top: 8px; padding: 5px 16px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel2); color: var(--gold);
    font-size: 12px; font-weight: 700;
  }
  #composeWrap {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 10;
  }
  #composeSheet {
    position: absolute; left: 0; right: 0; bottom: 0; max-width: 760px; margin: 0 auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px 16px 0 0;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  }
  #composeSheet h3 { font-size: 13px; letter-spacing: 1px; color: var(--dim); margin-bottom: 10px; }
  #composeSheet input, #composeSheet textarea {
    width: 100%; margin-bottom: 8px; padding: 10px 12px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--panel2); color: var(--text); font-size: 14px;
  }
  #composeSheet textarea { min-height: 120px; resize: vertical; font: inherit; }
  #composeBtns { display: flex; gap: 10px; }
  #composeSend {
    flex: 1; padding: 12px; border: 0; border-radius: 9px; background: var(--gold);
    color: #14100a; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  #composeSend:disabled { opacity: .6; }
  #composeCancel {
    padding: 12px 18px; border: 1px solid var(--line); border-radius: 9px;
    background: none; color: var(--dim); cursor: pointer;
  }
  #composeErr { color: var(--red); font-size: 13px; min-height: 18px; margin-top: 6px; }
  #accStatus { margin-top: 26px; font-size: 12px; color: var(--faint); }
  #accStatus .bad { color: var(--red); }
  #lockBtn { background: none; border: 0; color: var(--faint); font-size: 12px;
             text-decoration: underline; cursor: pointer; margin-top: 8px; }
  #alertBtn {
    display: none; margin: 14px 10px 0 0; padding: 8px 18px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--panel2); color: var(--gold);
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  #alertBtn:disabled { color: var(--green); cursor: default; }
  .empty { color: var(--faint); font-size: 13px; padding: 8px 2px; }

  /* view tabs */
  #mailTools, #msgTools { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  #readAllBtn, #msgReadAllBtn { padding: 5px 14px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--green); font-size: 12.5px; font-weight: 700; cursor: pointer; }
  #viewTabs { display: flex; gap: 8px; margin-bottom: 10px; }
  #searchBox { width: 100%; padding: 10px 14px; margin-bottom: 14px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--panel); color: var(--text); font-size: 15px; }
  #searchBox::placeholder { color: var(--faint); }
  .vtab {
    flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel); color: var(--dim); font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .vtab.on { background: var(--gold); border-color: var(--gold); color: #14100a; }
  .tabBadge { display: none; }
  .tabBadge.show {
    display: inline-block; margin-left: 7px; background: var(--red); color: #fff;
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px;
  }
  /* chat list */
  .chat { display: flex; align-items: center; gap: 11px; padding: 11px 12px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; }
  .net { font-size: 9px; font-weight: 800; letter-spacing: .5px; padding: 3px 7px; border-radius: 6px;
    white-space: nowrap; color: #fff; }
  .net.signal { background: #3a76f0; } .net.slack { background: #611f69; }
  .net.whatsapp { background: #25d366; color: #07331a; } .net.telegram { background: #2aabee; }
  .net.imessage { background: #3a76f0; }
  .net.sms, .net.googlemessages { background: #34c759; color: #07331a; }
  .net.instagram { background: #d6328f; } .net.x, .net.twitter { background: #222; }
  .net.messenger, .net.facebook { background: #0084ff; } .net.discord { background: #5865f2; }
  .net.generic { background: var(--faint); }
  .chatMid { flex: 1; min-width: 0; }
  .chatTitle { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chatPrev { font-size: 12.5px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chatRight { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .chatAgo { font-size: 11px; color: var(--faint); white-space: nowrap; }
  .chatUnread { background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    min-width: 18px; text-align: center; padding: 1px 5px; border-radius: 999px; }
  /* thread */
  #thread { display: none; position: fixed; inset: 0; z-index: 6; background: var(--bg);
    flex-direction: column; }
  #thread.open { display: flex; }
  #threadHead { display: flex; align-items: center; gap: 8px; padding: calc(8px + env(safe-area-inset-top)) 14px 8px;
    border-bottom: 1px solid var(--line); }
  #threadBack { background: none; border: 0; color: var(--gold); font-size: 16px; font-weight: 700;
    cursor: pointer; padding: 6px 8px 6px 0; }
  #threadTitle { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #threadBody { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px;
    max-width: 760px; margin: 0 auto; width: 100%; }
  .bub { max-width: 78%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4;
    word-break: break-word; white-space: pre-wrap; }
  .bub.them { align-self: flex-start; background: var(--panel); border: 1px solid var(--line);
    border-bottom-left-radius: 4px; }
  .bub.me { align-self: flex-end; background: var(--gold); color: #14100a; border-bottom-right-radius: 4px; }
  .bubName { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 2px; }
  .bubTime { font-size: 10px; color: var(--faint); margin-top: 3px; }
  #threadCompose { display: flex; gap: 8px; padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line); max-width: 760px; margin: 0 auto; width: 100%; }
  #threadInput { flex: 1; padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text); font-size: 14px; }
  /* Right-pane placeholder — only visible on desktop when nothing is open */
  #deskPane {
    display: none; position: fixed; left: var(--list-w); right: 0; top: 0; bottom: 0; z-index: 4;
    align-items: center; justify-content: center; text-align: center; padding: 40px;
    color: var(--faint); font-size: 15px; line-height: 1.6;
  }
  #deskPane .dpIcon { font-size: 34px; display: block; margin-bottom: 12px; opacity: .8; }
  /* ---- Desktop two-pane layout (wide screens only; phone view untouched) ---- */
  @media (min-width: 980px) {
    .wrap { max-width: var(--list-w); margin: 0; min-height: 100vh;
      border-right: 1px solid var(--line); padding: 22px 22px 60px 30px; }
    #reader, #thread { left: var(--list-w); }
    #readerInner { max-width: 680px; }
    #deskPane { display: flex; flex-direction: column; }
  }
  #threadSend { padding: 0 18px; border: 0; border-radius: 999px; background: var(--gold);
    color: #14100a; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MAIL<span>BRIEF</span></h1>
    <div id="hdrRight">
      <span id="updated"></span>
      <button id="updateBtn" title="Update now">↻</button>
    </div>
  </header>

  <div id="keyScreen">
    <h2>Private Brief</h2>
    <p>Enter your access key. It will be remembered on this device.</p>
    <input id="keyInput" type="password" autocomplete="current-password" placeholder="access key">
    <br>
    <button id="keyBtn">Open</button>
    <div id="keyErr"></div>
  </div>

  <div id="app" style="display:none">
    <div id="netBar"></div>
    <div id="viewTabs">
      <button id="tabMail" class="vtab on">Mail<span id="mailBadge" class="tabBadge"></span></button>
      <button id="tabMsg" class="vtab">Texts<span id="msgBadge" class="tabBadge"></span></button>
      <button id="tabDM" class="vtab">DMs<span id="dmBadge" class="tabBadge"></span></button>
    </div>
    <input id="searchBox" type="search" placeholder="Search…" autocomplete="off">
    <div id="mailView">
      <div id="briefStrip"></div>
      <div id="mailTools"><button id="readAllBtn">✓ Mark all read</button></div>
      <div id="chips"></div>
      <div id="content"></div>
      <div id="accStatus"></div>
    </div>
    <div id="msgView" style="display:none"></div>
    <button id="alertBtn">🔔 Enable alerts</button>
    <br>
    <button id="lockBtn">Sign out of this device</button>
  </div>
</div>

<div id="thread">
  <div id="threadHead">
    <button id="threadBack">‹ Back</button>
    <span class="acct" id="threadNet"></span>
    <span id="threadTitle"></span>
  </div>
  <div id="threadBody"></div>
  <div id="threadCompose">
    <input id="threadInput" type="text" placeholder="Message…">
    <button id="threadSend">Send</button>
  </div>
</div>

<div id="reader">
  <div id="readerInner">
    <button id="readerBack">‹ Back</button>
    <div id="readerMeta">
      <span class="acct" id="readerAcct"></span>
      <span class="from" id="readerFrom"></span>
      <span class="ago" id="readerAgo"></span>
    </div>
    <div id="readerSubject"></div>
    <div id="readerActions">
      <button class="replyBtn" id="readerDone" style="margin-top:0">✓ Done</button>
      <button class="replyBtn" id="readerReply" style="margin-top:0">Reply</button>
      <button class="replyBtn" id="readerDraft" style="margin-top:0">✨ Draft</button>
      <a class="openLink" id="readerOpen" target="_blank" rel="noopener">Open in mailbox ↗</a>
    </div>
    <div id="readerBody"></div>
  </div>
</div>

<div id="deskPane">
  <div><span class="dpIcon">✉️</span>Select an email or conversation<br>to read it here.</div>
</div>

<div id="toast"></div>

<div id="composeWrap">
  <div id="composeSheet">
    <h3 id="composeTitle">REPLY</h3>
    <input id="composeTo" type="email" placeholder="To">
    <input id="composeSubj" type="text" placeholder="Subject">
    <div id="composeSuggest"></div>
    <textarea id="composeBody" placeholder="Write your reply… (tap the mic on your keyboard to dictate)"></textarea>
    <div id="composeWarn"></div>
    <div id="composeBtns">
      <button id="composeSend">Send</button>
      <button id="composeCancel">Cancel</button>
    </div>
    <div id="composeErr"></div>
    <div id="aiDisclosure">✨ AI drafts &amp; summaries send this message's text to OpenRouter.</div>
  </div>
</div>

<script>
// All email-derived strings (senders, subjects, snippets) are untrusted.
// The UI is therefore built exclusively with createElement/textContent —
// no HTML string assembly anywhere.
const DB = "https://mail-brief-gio-default-rtdb.firebaseio.com";
let BRIEF = null;
let FILTER = "ALL";
let SEARCH = "";

// Case-insensitive: does the (already-lowercased) query appear in any field?
function matchText(q) {
  for (let n = 1; n < arguments.length; n++) {
    const f = arguments[n];
    if (f && String(f).toLowerCase().indexOf(q) !== -1) return true;
  }
  return false;
}

const $ = id => document.getElementById(id);

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function ago(ts) {
  const s = Math.max(1, Math.floor(Date.now() / 1000 - ts));
  if (s < 3600) return Math.floor(s / 60) + "m";
  if (s < 86400) return Math.floor(s / 3600) + "h";
  return Math.floor(s / 86400) + "d";
}

function safeLink(url) {
  return typeof url === "string" && url.startsWith("https://") ? url : null;
}

function card(i, cls) {
  const link = safeLink(i.link);
  const hasBody = !!i.body;
  // Cards with full text are tap-to-expand containers; others link straight out.
  const node = el(hasBody || !link ? "div" : "a", "card" + (cls ? " " + cls : ""));
  if (!hasBody && link) {
    node.href = link; node.target = "_blank"; node.rel = "noopener";
    // Opening it in Gmail/Yahoo counts as reading it — sync the read state.
    node.addEventListener("click", () => markRead(i));
  }

  const row = el("div", "row1");
  if (i.unread) row.appendChild(el("span", "unread"));
  row.appendChild(el("span", "acct", i.account));
  row.appendChild(el("span", "from", i.from_name || i.from_email || "?"));
  row.appendChild(el("span", "ago", ago(i.ts)));
  if (i.stale) { const s = el("span", "stalePill", "STALE"); s.title = "This account didn't refresh last time — showing your last known mail."; row.appendChild(s); }
  node.appendChild(row);

  node.appendChild(el("div", "subj", i.subject || "(no subject)"));
  // Lead with the AI action summary ("what do they need") when we have it;
  // fall back to the raw snippet otherwise.
  if (i.action_summary) {
    const a = el("div", "actionSum");
    a.appendChild(el("span", "actionDot", "➜"));
    a.appendChild(document.createTextNode(i.action_summary));
    node.appendChild(a);
  } else if (i.snippet) {
    node.appendChild(el("div", "snip", i.snippet));
  }

  if (hasBody) {
    node.appendChild(el("div", "expandHint", "tap to read"));
    node.style.cursor = "pointer";
    node.addEventListener("click", e => {
      if (e.target.closest("a") || e.target.closest("button")) return;
      openReader(i);
    });
  }

  if (i.reply_to && i.msgid && i.bucket !== "junk") {
    const btn = el("button", "replyBtn", "Reply");
    btn.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();
      openCompose(i);
    });
    node.appendChild(btn);
  }
  return node;
}

const API = "https://mail-brief-gio.web.app/api/send";
let composeItem = null;
let readerItem = null;

// Mark an item read: update it locally (drops the blue dot, persists in the
// device cache) and tell the server to set it read on Gmail/Yahoo too.
function markRead(i) {
  if (!i || !i.unread) return;
  i.unread = false;
  try { if (BRIEF) localStorage.setItem("mailbrief_cache", JSON.stringify(BRIEF)); } catch (e) {}
  render();
  if (!i.msgid) return; // no message id (e.g. demo data) — nothing to sync
  const key = localStorage.getItem("mailbrief_key");
  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, action: "markread", account: i.account, msgid: i.msgid }),
  }).catch(() => {}); // best-effort; the next refresh reconciles anyway
}

function openReader(i) {
  readerItem = i;
  markRead(i);
  $("readerAcct").textContent = i.account;
  $("readerFrom").textContent = i.from_name || i.from_email || "?";
  $("readerAgo").textContent = ago(i.ts);
  $("readerSubject").textContent = i.subject || "(no subject)";
  $("readerBody").textContent = i.body || "";
  const link = safeLink(i.link);
  $("readerOpen").style.display = link ? "inline" : "none";
  if (link) $("readerOpen").href = link;
  $("readerReply").style.display = (i.reply_to && i.msgid) ? "inline-block" : "none";
  $("reader").style.display = "block";
  $("reader").scrollTop = 0;
}

function closeReader() {
  $("reader").style.display = "none";
  readerItem = null;
}

// ===== Undo / sync-state toast =====
let toastTimer = null, toastExpireFn = null;
function hideToast(runExpire) {
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  const fn = toastExpireFn; toastExpireFn = null;
  $("toast").classList.remove("show");
  if (runExpire && fn) fn();
}
// showToast(msg, { undo, onExpire, ms, state }) — state: ok|send|fail|offline
function showToast(msg, opts) {
  opts = opts || {};
  hideToast(true); // commit any pending action before replacing the toast
  const t = $("toast");
  t.replaceChildren();
  t.className = "state-" + (opts.state || "ok");
  t.appendChild(el("span", "tState"));
  t.appendChild(el("span", "tMsg", msg));
  if (opts.undo) {
    const b = el("button", "tUndo", "Undo");
    b.addEventListener("click", () => { hideToast(false); opts.undo(); });
    t.appendChild(b);
  }
  t.classList.add("show");
  toastExpireFn = opts.onExpire || null;
  toastTimer = setTimeout(() => hideToast(true), opts.ms || (opts.undo ? 6000 : 2400));
}
function cacheBrief() { try { localStorage.setItem("mailbrief_cache", JSON.stringify(BRIEF)); } catch (e) {} }

// "Done": remove immediately and show "Archived — Undo". The real archive on the
// mail server is deferred until the undo window closes, so Undo needs no server
// round-trip. Sync state is shown live; a server failure rolls the item back.
function archiveItem(i) {
  if (!i || !BRIEF || !BRIEF.items) return;
  const idx = BRIEF.items.indexOf(i);
  if (idx < 0) return;
  BRIEF.items.splice(idx, 1);
  cacheBrief();
  closeReader();
  render();
  showToast("Archived", {
    state: "ok", ms: 6000,
    undo: () => {                       // nothing sent yet — just restore it
      BRIEF.items.splice(Math.min(idx, BRIEF.items.length), 0, i);
      cacheBrief(); render();
    },
    onExpire: () => commitArchive(i, idx),
  });
}

async function commitArchive(i, idx) {
  if (!i.msgid) return;                  // demo/no-id items can't sync
  const key = localStorage.getItem("mailbrief_key");
  showToast("Archiving…", { state: "send", ms: 8000 });
  let ok = false;
  try {
    const r = await fetch(API, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key, action: "archive", account: i.account, msgid: i.msgid }),
    });
    const d = await r.json().catch(() => ({}));
    ok = r.ok && d.archived;
  } catch (e) { /* offline */ }
  if (ok) {
    showToast("Archived ✓", { state: "ok", ms: 1600 });
  } else {
    if (BRIEF && BRIEF.items && BRIEF.items.indexOf(i) < 0) {
      BRIEF.items.splice(Math.min(idx, BRIEF.items.length), 0, i);
      cacheBrief(); render();
    }
    showToast("Couldn't archive — back in your inbox", { state: "fail", ms: 4500 });
  }
}

// "Clear all": archive every email currently shown in Needs Attention (respects
// the account filter). Files them to Archive/All Mail — reversible, not deleted.
// One bulk call per account, so 50 emails = a couple of requests, not 50.
async function archiveAllAttention() {
  if (!BRIEF || !BRIEF.items) return;
  const targets = BRIEF.items.filter(i =>
    i.bucket === "attention" && (FILTER === "ALL" || i.account === FILTER));
  if (!targets.length) return;
  const scope = FILTER === "ALL" ? "" : " in " + FILTER;
  if (!confirm("Archive all " + targets.length + " emails in Needs Attention" + scope +
    "?\n\nThey move to your Archive (not deleted) and you can still find them in your mailbox.")) return;

  const key = localStorage.getItem("mailbrief_key");
  const removed = targets.slice();
  removed.forEach(i => {
    const idx = BRIEF.items.indexOf(i);
    if (idx >= 0) BRIEF.items.splice(idx, 1);
  });
  try { localStorage.setItem("mailbrief_cache", JSON.stringify(BRIEF)); } catch (e) {}
  closeReader();
  render();
  updateNetBar(undefined, "Archiving " + removed.length + "…");

  // Group by account and send one bulk archive request each.
  const byAccount = {};
  removed.forEach(i => {
    if (!i.msgid) return; // demo/no-id items can't sync
    (byAccount[i.account] = byAccount[i.account] || []).push(i.msgid);
  });
  const failed = [];
  for (const account of Object.keys(byAccount)) {
    try {
      const r = await fetch(API, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, action: "archiveall", account, msgids: byAccount[account] }),
      });
      const d = await r.json().catch(() => ({}));
      if (!(r.ok && typeof d.archived === "number")) {
        failed.push(...removed.filter(i => i.account === account && i.msgid));
      }
    } catch (e) {
      failed.push(...removed.filter(i => i.account === account && i.msgid));
    }
  }
  if (failed.length) {
    failed.forEach(i => BRIEF.items.push(i));
    try { localStorage.setItem("mailbrief_cache", JSON.stringify(BRIEF)); } catch (e) {}
    render();
    updateNetBar(undefined, failed.length + " couldn't be archived — still in your inbox");
    setTimeout(() => updateNetBar(), 6000);
  } else {
    updateNetBar(undefined, "Archived " + removed.length + " ✓");
    setTimeout(() => updateNetBar(), 3000);
  }
}

// Mark every shown unread email read — locally and on Gmail/Yahoo.
async function markAllRead() {
  if (!BRIEF || !BRIEF.items) return;
  const byAccount = {};
  let any = false;
  BRIEF.items.forEach(i => {
    if (i.unread && i.msgid) {
      i.unread = false; any = true;
      (byAccount[i.account] = byAccount[i.account] || []).push(i.msgid);
    } else if (i.unread) { i.unread = false; any = true; }
  });
  if (!any) { updateNetBar(undefined, "Nothing unread"); setTimeout(() => updateNetBar(), 3000); return; }
  try { localStorage.setItem("mailbrief_cache", JSON.stringify(BRIEF)); } catch (e) {}
  render();
  const key = localStorage.getItem("mailbrief_key");
  Object.keys(byAccount).forEach(acct => {
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key, action: "markallread", account: acct, msgids: byAccount[acct] }),
    }).catch(() => {});
  });
  updateNetBar(undefined, "✓ Marked all read");
  setTimeout(() => updateNetBar(), 4000);
}

function openCompose(i) {
  composeItem = i;
  $("composeTitle").textContent = "REPLY FROM " + i.account;
  $("composeTo").value = i.reply_to;
  $("composeSubj").value = /^re:/i.test(i.subject || "") ? i.subject : "Re: " + (i.subject || "");
  $("composeBody").value = "";
  $("composeErr").textContent = "";
  $("composeWarn").style.display = "none";
  $("composeSend").disabled = false;
  $("composeSend").textContent = "Send";
  $("composeWrap").style.display = "block";
  $("composeBody").focus();
}

function closeCompose() {
  $("composeWrap").style.display = "none";
  composeItem = null;
}

async function sendReply() {
  if (!composeItem) return;
  const body = $("composeBody").value.trim();
  if (!body) { $("composeErr").textContent = "Write something first."; return; }
  const ph = currentPlaceholders();
  if (ph.length && !confirm("This reply still has placeholders: " + ph.join(", ") + "\n\nSend anyway?")) return;
  const btn = $("composeSend");
  btn.disabled = true;
  btn.textContent = "Sending…";
  $("composeErr").textContent = "";
  const payload = {
    key: localStorage.getItem("mailbrief_key"),
    account: composeItem.account,
    to: $("composeTo").value.trim(),
    subject: $("composeSubj").value.trim(),
    body: body,
    inReplyTo: composeItem.msgid,
    references: composeItem.references || "",
  };
  let r = null;
  try {
    r = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    // No connection — park it in the outbox; it sends on reconnect.
    const q = outbox();
    q.push({ payload, queuedAt: Date.now() });
    setOutbox(q);
    btn.textContent = "Saved to outbox ✓";
    setTimeout(closeCompose, 1200);
    return;
  }
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    btn.disabled = false;
    btn.textContent = "Send";
    $("composeErr").textContent = data.error || "Couldn't send — try again.";
    return;
  }
  btn.textContent = "Sent ✓";
  setTimeout(closeCompose, 900);
}

/* ===== offline: outbox + status bar ===== */
function outbox() {
  try { return JSON.parse(localStorage.getItem("mailbrief_outbox") || "[]"); }
  catch (e) { return []; }
}
function setOutbox(q) {
  localStorage.setItem("mailbrief_outbox", JSON.stringify(q));
  updateNetBar();
}

let isOffline = false;
function updateNetBar(offline, note) {
  if (offline !== undefined) isOffline = offline;
  const q = outbox();
  const parts = [];
  if (note) parts.push(note);
  if (isOffline) {
    const at = (BRIEF && BRIEF.generated_at) || 0;
    parts.push("Offline — showing mail from " + (at ? ago(at) + " ago" : "your last visit"));
  }
  if (q.length) {
    parts.push(q.length + (q.length === 1 ? " reply" : " replies") + " in outbox — sends when online" +
      (q[0].error ? " (last try: " + q[0].error + ")" : ""));
  }
  const bar = $("netBar");
  bar.textContent = parts.join("  ·  ");
  bar.style.display = parts.length ? "block" : "none";
}

let flushing = false;
async function flushOutbox() {
  if (flushing) return;
  const q = outbox();
  if (!q.length) return;
  flushing = true;
  const remaining = [];
  let sentCount = 0;
  for (let n = 0; n < q.length; n++) {
    const entry = q[n];
    let r = null;
    try {
      r = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(entry.payload),
      });
    } catch (e) {
      remaining.push(...q.slice(n)); // still offline — keep the rest queued
      break;
    }
    const data = await r.json().catch(() => ({}));
    if (r.ok && data.ok) { sentCount++; }
    else { entry.error = data.error || "rejected"; remaining.push(entry); }
  }
  setOutbox(remaining);
  flushing = false;
  if (sentCount) {
    updateNetBar(undefined, "✓ " + sentCount + (sentCount === 1 ? " queued reply" : " queued replies") + " sent");
    setTimeout(() => updateNetBar(), 5000);
  }
}

function section(parent, label, color, items, cls, emptyText, onClearAll) {
  const head = el("div", "secHead");
  const dot = el("span", "dot");
  dot.style.background = color;
  head.appendChild(dot);
  head.appendChild(document.createTextNode(label + " "));
  head.appendChild(el("span", "count", "(" + items.length + ")"));
  if (onClearAll && items.length) {
    const btn = el("button", "clearAllBtn", "Clear all");
    btn.addEventListener("click", onClearAll);
    head.appendChild(btn);
  }
  parent.appendChild(head);
  if (!items.length) {
    parent.appendChild(el("div", "empty", emptyText));
  } else {
    items.forEach(i => parent.appendChild(card(i, cls)));
  }
}

// Push the unread email count to the iPhone home-screen badge (the red number
// on the app icon). Works on installed PWAs once notifications are allowed.
function updateAppBadge() {
  const n = (BRIEF && BRIEF.items) ? BRIEF.items.filter(i => i.unread).length : 0;
  setBadge("mailBadge", n);   // red count on the Mail tab
  if (!("setAppBadge" in navigator)) return;
  (n > 0 ? navigator.setAppBadge(n) : navigator.clearAppBadge()).catch(() => {});
}

// Command-center daily brief: the derivable at-a-glance stats. (Meeting-change
// and document-action counts arrive with the AI action-summary phase.)
function renderBriefStrip(attn) {
  const strip = $("briefStrip");
  strip.replaceChildren();
  if (!attn.length) { strip.style.display = "none"; return; }
  strip.style.display = "flex";
  const repliable = attn.filter(i => i.reply_to).length;
  const unread = attn.filter(i => i.unread).length;
  const oldest = attn.reduce((m, i) => Math.min(m, i.ts || Infinity), Infinity);
  const overdue = oldest !== Infinity && (Date.now() / 1000 - oldest) > 172800; // >2 days
  const meetings = attn.filter(i => i.signals && i.signals.meeting).length;
  const docs = attn.filter(i => i.signals && i.signals.doc).length;
  const cells = [
    { n: attn.length, label: "need attention", tone: "gold" },
    { n: repliable, label: "to reply", tone: "gold" },
  ];
  // Meeting/document counts appear once the AI has tagged items; otherwise fall
  // back to the always-available "unread" stat so the strip is never sparse.
  if (meetings) cells.push({ n: meetings, label: meetings === 1 ? "meeting change" : "meeting changes", tone: "gold" });
  if (docs) cells.push({ n: docs, label: docs === 1 ? "doc to action" : "docs to action", tone: "gold" });
  if (!meetings && !docs) cells.push({ n: unread, label: "unread", tone: "blue" });
  if (oldest !== Infinity) cells.push({ n: ago(oldest), label: "oldest waiting", tone: overdue ? "red" : "gray" });
  cells.forEach(c => {
    const cell = el("div", "statCell tone-" + c.tone);
    cell.appendChild(el("div", "statN", String(c.n)));
    cell.appendChild(el("div", "statL", c.label));
    strip.appendChild(cell);
  });
}

function render() {
  if (!BRIEF) return;
  updateAppBadge();
  const all = BRIEF.items || [];
  const items = all.filter(i => FILTER === "ALL" || i.account === FILTER);
  const attn = items.filter(i => i.bucket === "attention");
  const fyi  = items.filter(i => i.bucket === "fyi");
  const junk = items.filter(i => i.bucket === "junk");

  renderBriefStrip(SEARCH ? [] : attn);

  const chips = $("chips");
  chips.replaceChildren();
  ["ALL", ...new Set(all.map(i => i.account))].forEach(a => {
    const b = el("button", "chip" + (FILTER === a ? " on" : ""), a);
    b.addEventListener("click", () => { FILTER = a; render(); });
    chips.appendChild(b);
  });

  const content = $("content");
  content.replaceChildren();

  if (SEARCH) {
    const matches = items.filter(i => matchText(SEARCH, i.from_name, i.from_email, i.subject, i.snippet, i.body));
    section(content, "RESULTS", "var(--gold)", matches, "", "No matching email.");
  } else {
    section(content, "NEEDS ATTENTION", "var(--red)", attn, "attn", "Nothing needs your attention.", archiveAllAttention);
    section(content, "FYI", "var(--blue)", fyi, "fyi", "Nothing here.");

    const junkHead = el("div", "secHead");
    const jdot = el("span", "dot"); jdot.style.background = "var(--faint)";
    junkHead.appendChild(jdot);
    junkHead.appendChild(document.createTextNode("JUNK "));
    junkHead.appendChild(el("span", "count", "(" + junk.length + ")"));
    content.appendChild(junkHead);

    const senders = [...new Set(junk.map(j => j.from_name))].slice(0, 6).join(", ");
    const junkBar = el("div", null,
      junk.length + " junk emails kept out of your way" + (senders ? " — " + senders : "") + " (tap to view)");
    junkBar.id = "junkBar";
    const junkList = el("div");
    junkList.id = "junkList";
    junk.forEach(i => junkList.appendChild(card(i, "")));
    junkBar.appendChild(junkList);
    junkBar.addEventListener("click", e => {
      if (e.target.closest("a")) return;
      junkList.style.display = junkList.style.display === "block" ? "none" : "block";
    });
    content.appendChild(junkBar);
  }

  const gen = BRIEF.generated_at || 0;
  const mins = Math.floor(Date.now() / 1000 - gen) / 60;
  $("updated").textContent = "updated " + ago(gen) + " ago";
  $("updated").className = mins > 90 ? "stale" : "";

  const st = $("accStatus");
  st.replaceChildren();
  (BRIEF.accounts || []).forEach(a => {
    const span = el("span", a.ok ? null : "bad",
      a.ok ? "✓ " + a.account + " (" + a.count + ")"
           : "✗ " + a.account + " — check its app password");
    st.appendChild(span);
    st.appendChild(document.createTextNode("   "));
  });

  updateAppBadge();
}

async function load(key, fromButton) {
  let gotResponse = false, data = null;
  try {
    const r = await fetch(DB + "/briefs/" + encodeURIComponent(key) + "/brief.json");
    gotResponse = true;
    data = await r.json();
  } catch (e) { /* network failure — handled below */ }

  if (data) {
    BRIEF = data;
    localStorage.setItem("mailbrief_key", key);
    localStorage.setItem("mailbrief_cache", JSON.stringify(data));
    $("keyScreen").style.display = "none";
    $("app").style.display = "block";
    render();
    updateNetBar(false);
    flushOutbox();
    loadMessages();
    return;
  }

  // No data this attempt. Fall back to the last brief we cached on this device.
  const haveSavedKey = !!localStorage.getItem("mailbrief_key");
  const cached = localStorage.getItem("mailbrief_cache");
  if (cached && haveSavedKey) {
    try {
      BRIEF = JSON.parse(cached);
      $("keyScreen").style.display = "none";
      $("app").style.display = "block";
      render();
      updateNetBar(true);
      return;
    } catch (e2) { /* corrupt cache — fall through */ }
  }

  if (fromButton) {
    $("keyErr").textContent = gotResponse
      ? "That key didn't open anything. Check it and try again."
      : "No connection — try again when you're online.";
    return;
  }

  // Auto-load with a saved key but nothing to show yet: NEVER nag for the code.
  // Stay in the app, show a quiet "connecting", and retry shortly.
  if (haveSavedKey) {
    $("keyScreen").style.display = "none";
    $("app").style.display = "block";
    updateNetBar(undefined, "Connecting…");
    setTimeout(() => load(key, false), 4000);
    return;
  }

  showKeyScreen();
}

function showKeyScreen() {
  $("app").style.display = "none";
  $("keyScreen").style.display = "block";
}

async function updateNow() {
  const btn = $("updateBtn");
  const key = localStorage.getItem("mailbrief_key");
  if (!key || btn.disabled) return;
  btn.disabled = true;
  btn.classList.add("spin");
  const before = BRIEF && BRIEF.generated_at;
  load(key, false); // instant display refresh while the robot spins up
  const done = note => {
    btn.disabled = false;
    btn.classList.remove("spin");
    if (note) { updateNetBar(undefined, note); setTimeout(() => updateNetBar(), 6000); }
  };
  let resp = null;
  try {
    resp = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key, action: "refresh" }),
    });
  } catch (e) {
    return done("↻ Offline — pull again when you have a connection");
  }
  const d = await resp.json().catch(() => ({}));
  if (!resp.ok || !d.ok) return done("↻ " + (d.error || "couldn't start the check"));
  updateNetBar(undefined, "↻ Checking your mailboxes — takes about a minute");
  const t0 = Date.now();
  const poll = setInterval(async () => {
    await load(key, false);
    if (BRIEF && BRIEF.generated_at !== before) {
      clearInterval(poll);
      done("✓ Updated just now");
    } else if (Date.now() - t0 > 180000) {
      clearInterval(poll);
      done("Checked — nothing new arrived");
    }
  }, 12000);
}
$("updateBtn").addEventListener("click", updateNow);

$("readerBack").addEventListener("click", closeReader);

// Swipe horizontally (either direction) to go back from the reader — no tap needed.
(function () {
  const r = $("reader");
  let sx = 0, sy = 0, tracking = false;
  r.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) { tracking = false; return; }
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
  }, { passive: true });
  r.addEventListener("touchend", e => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    // a clear sideways flick (not a vertical scroll) returns to the list
    if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.5) closeReader();
  }, { passive: true });
})();
$("readerReply").addEventListener("click", () => { if (readerItem) openCompose(readerItem); });
$("readerDraft").addEventListener("click", () => { if (readerItem) draftReply(readerItem); });

// AI-drafted replies in Gio's voice: open the compose sheet and fill it with
// tappable suggestions from the function. Each suggestion drops into the body
// (then edit / dictate / send as normal).
const TONE_CHIPS = [
  { key: "quick_yes", label: "Quick yes" },
  { key: "question", label: "Ask a question" },
  { key: "decline", label: "Decline" },
  { key: "schedule", label: "Schedule" },
];

// "✨ Draft": offer tone chips instead of three generic drafts. Picking one
// generates a single reply in that tone, with any unknown detail left as a
// highlighted [placeholder] you must fill before sending.
function draftReply(i) {
  openCompose(i);
  const sug = $("composeSuggest");
  sug.replaceChildren();
  sug.appendChild(el("div", "sugNote", "Draft a reply — pick a tone:"));
  const row = el("div", "toneChips");
  TONE_CHIPS.forEach(t => {
    const chip = el("button", "toneChip", t.label);
    chip.addEventListener("click", () => generateDraft(i, t.key, chip));
    row.appendChild(chip);
  });
  const custom = el("button", "toneChip custom", "Custom");
  custom.addEventListener("click", () => { sug.replaceChildren(); $("composeBody").focus(); });
  row.appendChild(custom);
  sug.appendChild(row);
}

async function generateDraft(i, tone, chipEl) {
  const sug = $("composeSuggest");
  [...sug.querySelectorAll(".toneChip")].forEach(c => c.classList.remove("on"));
  if (chipEl) chipEl.classList.add("on");
  let note = sug.querySelector(".sugNote");
  if (!note) { note = el("div", "sugNote"); sug.insertBefore(note, sug.firstChild); }
  note.className = "sugNote"; note.textContent = "✨ drafting in your voice…";
  const key = localStorage.getItem("mailbrief_key");
  try {
    const r = await fetch(API, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key, action: "draft", kind: "email", tone,
        subject: i.subject, sender: (i.from_name || "") + " <" + (i.from_email || "") + ">",
        body: i.body || i.snippet || "" }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok || !d.options || !d.options[0]) { note.className = "sugErr"; note.textContent = d.error || "Couldn't draft right now"; return; }
    $("composeBody").value = d.options[0];
    note.textContent = "Edit or dictate, then send:";
    updatePlaceholderWarning();
    $("composeBody").focus();
  } catch (e) {
    note.className = "sugErr"; note.textContent = "Offline — can't draft right now";
  }
}

// Any [bracketed] text the AI left because it lacked a detail. Surfaced as a
// warning and guarded at send-time so a half-filled draft can't go out.
function currentPlaceholders() {
  const m = ($("composeBody").value.match(/\[[^\]\n]{1,40}\]/g)) || [];
  return [...new Set(m)];
}
function updatePlaceholderWarning() {
  const ph = currentPlaceholders();
  const w = $("composeWarn");
  if (ph.length) { w.textContent = "⚠ Fill in before sending: " + ph.join(", "); w.style.display = "block"; }
  else { w.style.display = "none"; w.textContent = ""; }
}
$("readerDone").addEventListener("click", () => { if (readerItem) archiveItem(readerItem); });
$("readAllBtn").addEventListener("click", markAllRead);

$("composeSend").addEventListener("click", sendReply);
$("composeCancel").addEventListener("click", closeCompose);
$("composeBody").addEventListener("input", updatePlaceholderWarning);
$("composeWrap").addEventListener("click", e => { if (e.target === $("composeWrap")) closeCompose(); });

$("keyBtn").addEventListener("click", () => load($("keyInput").value.trim(), true));
$("keyInput").addEventListener("keydown", e => { if (e.key === "Enter") $("keyBtn").click(); });
$("lockBtn").addEventListener("click", () => { localStorage.removeItem("mailbrief_key"); location.reload(); });

// ===== Messages (Beeper bridge) =====
var MSGS = null;
let threadChat = null;
const NET_LABELS = [
  ["signal", "SIGNAL"], ["slack", "SLACK"], ["whatsapp", "WHATSAPP"],
  ["telegram", "TELEGRAM"], ["imessage", "iMSG"], ["googlemessages", "SMS"],
  ["sms", "SMS"], ["instagram", "INSTA"], ["twitter", "X"], ["discord", "DISCORD"],
  ["messenger", "MSGR"], ["facebook", "MSGR"],
];
// Which tab a chat belongs to: Apple texts vs internet DMs.
function msgCategory(network) {
  const c = netClass(network);
  return (c === "imessage" || c === "sms") ? "msg" : "dm";
}
var MSGVIEW = "msg";
function netClass(n) {
  const s = (n || "").toLowerCase().replace(/[^a-z]/g, "");
  if (s.indexOf("imessage") !== -1) return "imessage";
  if (s.indexOf("sms") !== -1 || s.indexOf("googlemessages") !== -1) return "sms";
  for (const [k] of NET_LABELS) if (s.indexOf(k) !== -1) return k;
  return "generic";
}
function netLabel(n) {
  const s = (n || "").toLowerCase();
  for (const [k, label] of NET_LABELS) if (s.indexOf(k) !== -1) return label;
  return (n || "CHAT").toUpperCase().slice(0, 8);
}

async function loadMessages() {
  const key = localStorage.getItem("mailbrief_key");
  if (!key) return;
  try {
    const r = await fetch(DB + "/briefs/" + encodeURIComponent(key) + "/messages.json");
    const data = await r.json();
    if (data) { MSGS = data; localStorage.setItem("mailbrief_msgs", JSON.stringify(data)); }
  } catch (e) {
    const c = localStorage.getItem("mailbrief_msgs");
    if (c && !MSGS) { try { MSGS = JSON.parse(c); } catch (_) {} }
  }
  renderMessages();
  updateMsgBadges();
}

function setBadge(id, n) {
  const b = $(id);
  if (n > 0) { b.textContent = n; b.className = "tabBadge show"; }
  else { b.className = "tabBadge"; b.textContent = ""; }
}
function updateMsgBadges() {
  const chats = (MSGS && MSGS.chats) || [];
  let msgU = 0, dmU = 0;
  chats.forEach(c => {
    if (!c.unread) return;
    if (msgCategory(c.network) === "msg") msgU += c.unread; else dmU += c.unread;
  });
  setBadge("msgBadge", msgU);
  setBadge("dmBadge", dmU);
}

function renderMessages() {
  const v = $("msgView");
  v.replaceChildren();
  let chats = (MSGS && MSGS.chats) || [];
  chats = chats.filter(c => msgCategory(c.network) === MSGVIEW);
  if (SEARCH) {
    chats = chats.filter(c => matchText(SEARCH, c.title, c.preview) ||
      (c.messages || []).some(m => matchText(SEARCH, m.text)));
  }
  if (!chats.length) {
    const none = !MSGS ? "Connecting to your messages…"
      : SEARCH ? "No matching conversations."
      : MSGVIEW === "dm" ? "No DMs yet. Connect Signal / Slack / WhatsApp / Messenger in Beeper."
      : "No texts yet.";
    v.appendChild(el("div", "empty", none));
    return;
  }
  if (chats.some(c => c.unread > 0)) {
    const tools = el("div", null); tools.id = "msgTools";
    const btn = el("button", null, "✓ Mark all read"); btn.id = "msgReadAllBtn";
    btn.addEventListener("click", markAllMessagesRead);
    tools.appendChild(btn);
    v.appendChild(tools);
  }
  chats.forEach(c => {
    const row = el("div", "chat");
    row.appendChild(el("span", "net " + netClass(c.network), netLabel(c.network)));
    const mid = el("div", "chatMid");
    mid.appendChild(el("div", "chatTitle", c.title || "(no title)"));
    mid.appendChild(el("div", "chatPrev", c.preview || ""));
    row.appendChild(mid);
    const right = el("div", "chatRight");
    right.appendChild(el("div", "chatAgo", c.ts ? ago(c.ts) : ""));
    if (c.unread > 0) right.appendChild(el("div", "chatUnread", String(c.unread)));
    row.appendChild(right);
    row.addEventListener("click", () => openThread(c));
    v.appendChild(row);
  });
}

// Clear a conversation's unread state locally and tell the Mac to mark it
// read in Beeper (so the count stays cleared after the next refresh).
function markChatRead(c) {
  if (!c || !c.unread) return;
  c.unread = 0;
  try { localStorage.setItem("mailbrief_msgs", JSON.stringify(MSGS)); } catch (_) {}
  renderMessages();   // drop the row's unread pill (list stays visible on desktop)
  updateMsgBadges();
  const key = localStorage.getItem("mailbrief_key");
  if (!key || !c.id) return;
  fetch(DB + "/briefs/" + encodeURIComponent(key) + "/msg_outbox.json", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chatID: c.id, action: "read", at: Date.now() }),
  }).catch(() => {});
}

// Mark every conversation in the current tab (Texts or DMs) read.
function markAllMessagesRead() {
  const chats = (MSGS && MSGS.chats) || [];
  const key = localStorage.getItem("mailbrief_key");
  let changed = false;
  chats.forEach(c => {
    if (msgCategory(c.network) !== MSGVIEW || !c.unread) return;
    c.unread = 0; changed = true;
    if (key && c.id) {
      fetch(DB + "/briefs/" + encodeURIComponent(key) + "/msg_outbox.json", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatID: c.id, action: "read", at: Date.now() }),
      }).catch(() => {});
    }
  });
  if (!changed) return;
  try { localStorage.setItem("mailbrief_msgs", JSON.stringify(MSGS)); } catch (_) {}
  renderMessages();
  updateMsgBadges();
}

function openThread(c) {
  threadChat = c;
  markChatRead(c);
  $("threadNet").textContent = netLabel(c.network);
  $("threadNet").className = "net " + netClass(c.network);
  $("threadTitle").textContent = c.title || "(no title)";
  const body = $("threadBody");
  body.replaceChildren();
  (c.messages || []).forEach(m => {
    const b = el("div", "bub " + (m.is_me ? "me" : "them"));
    if (!m.is_me && c.group) b.appendChild(el("div", "bubName", m.sender || "?"));
    b.appendChild(document.createTextNode(m.text || (m.kind && m.kind !== "TEXT" ? "[" + m.kind.toLowerCase() + "]" : "")));
    b.appendChild(el("div", "bubTime", m.ts ? ago(m.ts) + " ago" : ""));
    body.appendChild(b);
  });
  $("thread").classList.add("open");
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 40);
}

function closeThread() { $("thread").classList.remove("open"); threadChat = null; }

async function sendMessage() {
  if (!threadChat) return;
  const inp = $("threadInput");
  const text = inp.value.trim();
  if (!text) return;
  const key = localStorage.getItem("mailbrief_key");
  const body = $("threadBody");
  const b = el("div", "bub me");
  b.appendChild(document.createTextNode(text));
  const stamp = el("div", "bubTime", "sending…");
  b.appendChild(stamp);
  body.appendChild(b);
  body.scrollTop = body.scrollHeight;
  inp.value = "";
  try {
    const r = await fetch(DB + "/briefs/" + encodeURIComponent(key) + "/msg_outbox.json", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chatID: threadChat.id, text: text, at: Date.now() }),
    });
    stamp.textContent = r.ok ? "queued ✓ — sends from your Mac" : "failed";
  } catch (e) {
    stamp.textContent = "offline — will send when connected";
  }
}

function switchView(which) {
  const mail = which === "mail";
  if (!mail) MSGVIEW = which; // "msg" (texts) or "dm"
  $("mailView").style.display = mail ? "block" : "none";
  $("msgView").style.display = mail ? "none" : "block";
  $("tabMail").classList.toggle("on", mail);
  $("tabMsg").classList.toggle("on", which === "msg");
  $("tabDM").classList.toggle("on", which === "dm");
  if (mail) { if (BRIEF) render(); } else loadMessages();
}

$("tabMail").addEventListener("click", () => switchView("mail"));
$("tabMsg").addEventListener("click", () => switchView("msg"));
$("tabDM").addEventListener("click", () => switchView("dm"));
$("searchBox").addEventListener("input", e => {
  SEARCH = e.target.value.trim().toLowerCase();
  if ($("mailView").style.display !== "none") { if (BRIEF) render(); }
  else renderMessages();
});
$("threadBack").addEventListener("click", closeThread);
$("threadSend").addEventListener("click", sendMessage);
$("threadInput").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
(function () {
  const t = $("thread");
  let sx = 0, sy = 0, tracking = false;
  t.addEventListener("touchstart", e => {
    if (e.target.closest("#threadCompose")) { tracking = false; return; }
    if (e.touches.length !== 1) { tracking = false; return; }
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
  }, { passive: true });
  t.addEventListener("touchend", e => {
    if (!tracking) return;
    tracking = false;
    const c = e.changedTouches[0];
    if (Math.abs(c.clientX - sx) > 65 && Math.abs(c.clientX - sx) > Math.abs(c.clientY - sy) * 1.5) closeThread();
  }, { passive: true });
})();

// Magic-link sign-in: the access key may arrive in the URL fragment (#k=...).
// Fragments never leave the device — they aren't sent to any server.
if (location.hash.startsWith("#k=")) {
  const k = location.hash.slice(3).trim();
  if (k) localStorage.setItem("mailbrief_key", k);
  history.replaceState(null, "", location.pathname);
}
const saved = localStorage.getItem("mailbrief_key");
if (saved) load(saved, false); else showKeyScreen();
setInterval(() => { const k = localStorage.getItem("mailbrief_key"); if (k && !document.hidden) load(k, false); }, 300000);
document.addEventListener("visibilitychange", () => {
  const k = localStorage.getItem("mailbrief_key");
  if (!document.hidden && k) load(k, false);
});
window.addEventListener("online", () => {
  updateNetBar(false);
  flushOutbox();
  const k = localStorage.getItem("mailbrief_key");
  if (k) load(k, false);
});
window.addEventListener("offline", () => updateNetBar(true));
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

/* ===== buzz notifications for new important mail ===== */
const VAPID_PUB = "BECv8w1dKUbZvlj4X6vhWEV9ukkimpvoG38aURLJElDJKigZv3gqabPus448uHk7N7e6Dg9OGw-yFkFeIbk_LQY";

function b64ToBytes(s) {
  const pad = "=".repeat((4 - s.length % 4) % 4);
  const raw = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

async function setupAlerts() {
  const btn = $("alertBtn");
  if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) return;
  btn.style.display = "inline-block";
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    const sub = reg && await reg.pushManager.getSubscription();
    if (sub && Notification.permission === "granted") {
      btn.textContent = "🔔 Alerts on ✓";
      btn.disabled = true;
      return;
    }
  } catch (e) { /* fall through to enable flow */ }
  btn.addEventListener("click", enableAlerts);
}

async function enableAlerts() {
  const btn = $("alertBtn");
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") {
      btn.textContent = "Alerts blocked — allow in Settings";
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: b64ToBytes(VAPID_PUB),
    });
    const key = localStorage.getItem("mailbrief_key");
    const r = await fetch(DB + "/briefs/" + encodeURIComponent(key) + "/subs.json", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sub: sub.toJSON(), ua: navigator.userAgent.slice(0, 80), at: Date.now() }),
    });
    if (!r.ok) throw new Error("could not save subscription");
    btn.textContent = "🔔 Alerts on ✓";
    btn.disabled = true;
  } catch (e) {
    btn.textContent = "Alerts failed — tap to retry";
  }
}
setupAlerts();
