<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/icon-180.png">
<title>Mail Brief</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>MAIL<span>BRIEF</span></h1>
    <div id="hdrRight">
      <span id="updated"></span>
      <button id="searchToggle" title="Search" aria-label="Search"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></button>
      <button id="prefsBtn" title="Preferences" aria-label="Preferences"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button id="updateBtn" title="Update now">↻</button>
    </div>
  </header>

  <div id="keyScreen">
    <h2>Private Brief</h2>
    <p>Enter your access key. It will be remembered on this device.</p>
    <label for="keyInput" id="keyLabel">Access key</label>
    <div id="keyField">
      <input id="keyInput" type="password" autocomplete="current-password" placeholder="access key">
      <button id="keyReveal" type="button" aria-label="Show access key" aria-pressed="false">Show</button>
    </div>
    <button id="keyBtn">Open</button>
    <div id="keyErr"></div>
  </div>

  <div id="app" style="display:none">
    <div id="netBar"></div>
    <div id="viewTabs" role="tablist" aria-label="Views">
      <button id="tabPriority" class="vtab on" role="tab" aria-selected="true" tabindex="0"><svg class="vtIco" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2.5l2.9 6.1 6.6.6-5 4.4 1.5 6.5L12 17.3 5.5 20.6 7 14.1 2 9.7l6.6-.6z"/></svg><span class="vtLabel">Priority</span><span id="prioBadge" class="tabBadge"></span></button>
      <button id="tabMail" class="vtab" role="tab" aria-selected="false" tabindex="-1"><svg class="vtIco" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7l8.5 6 8.5-6"/></svg><span class="vtLabel">All Mail</span><span id="mailBadge" class="tabBadge"></span></button>
      <button id="tabMsg" class="vtab" role="tab" aria-selected="false" tabindex="-1"><svg class="vtIco" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.4 8.4 0 0 1-12.3 7.5L3.5 20.5l1.5-5.1A8.4 8.4 0 1 1 21 11.5z"/></svg><span class="vtLabel">Texts</span><span id="msgBadge" class="tabBadge"></span></button>
      <button id="tabDM" class="vtab" role="tab" aria-selected="false" tabindex="-1"><svg class="vtIco" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="8" r="3.1"/><path d="M3.6 20a5.4 5.4 0 0 1 10.8 0"/><path d="M16 5.3a3.1 3.1 0 0 1 0 5.9"/><path d="M18.4 20a5.4 5.4 0 0 0-3-4.8"/></svg><span class="vtLabel">DMs</span><span id="dmBadge" class="tabBadge"></span></button>
    </div>
    <input id="searchBox" type="search" placeholder="Search…" autocomplete="off">
    <div id="briefStrip"></div>
    <div id="priorityView"></div>
    <div id="mailView" style="display:none">
      <div id="mailTools"><button id="readAllBtn">✓ Mark all read</button></div>
      <div id="chips"></div>
      <div id="content"></div>
      <div id="accStatus"></div>
    </div>
    <div id="msgView" style="display:none"></div>
    <button id="alertBtn">🔔 Enable alerts</button>
    <br>
    <button id="lockBtn">Sign out of this device</button>
  </div>
</div>

<div id="thread">
  <div id="threadHead">
    <button id="threadBack">‹ Back</button>
    <span class="acct" id="threadNet"></span>
    <span id="threadTitle"></span>
  </div>
  <div id="threadBody"></div>
  <div id="threadCompose">
    <input id="threadInput" type="text" placeholder="Message…">
    <button id="threadSend">Send</button>
  </div>
</div>

<div id="reader">
  <div id="readerInner">
    <button id="readerBack">‹ Back</button>
    <div id="readerMeta">
      <span class="acct" id="readerAcct"></span>
      <span class="from" id="readerFrom"></span>
      <span class="ago" id="readerAgo"></span>
    </div>
    <div id="readerSubject"></div>
    <div id="readerWhy"></div>
    <div id="readerAttach"></div>
    <div id="readerActions">
      <button class="replyBtn" id="readerDone" style="margin-top:0" title="Files this email out of your inbox (reversible)">Archive</button>
      <button class="replyBtn" id="readerReply" style="margin-top:0">Reply</button>
      <button class="replyBtn" id="readerDraft" style="margin-top:0">✨ Draft</button>
      <button class="replyBtn" id="readerSnooze" style="margin-top:0">⏰ Snooze</button>
      <button class="replyBtn" id="readerPin" style="margin-top:0">📌 Pin</button>
      <a class="openLink" id="readerOpen" target="_blank" rel="noopener">Open in mailbox ↗</a>
      <button class="replyBtn" id="readerMore" style="margin-top:0" aria-haspopup="menu">More ⋯</button>
    </div>
    <div id="readerThread"></div>
    <div id="readerBody"></div>
  </div>
</div>

<div id="deskPane">
  <div><span class="dpIcon">✉️</span>Select an email or conversation<br>to read it here.</div>
</div>

<div id="toast"></div>
<div id="snoozeMenu"></div>
<div id="settingsWrap"><div id="settingsSheet" role="dialog" aria-modal="true" aria-label="Preferences"></div></div>

<div id="composeWrap">
  <div id="composeSheet" role="dialog" aria-modal="true" aria-labelledby="composeTitle">
    <h3 id="composeTitle">REPLY</h3>
    <input id="composeTo" type="email" placeholder="To">
    <input id="composeSubj" type="text" placeholder="Subject">
    <div id="composeSuggest"></div>
    <textarea id="composeBody" placeholder="Write your reply… (tap the mic on your keyboard to dictate)"></textarea>
    <div id="composeWarn"></div>
    <div id="composeBtns">
      <button id="composeSend">Send</button>
      <button id="composeCancel">Cancel</button>
    </div>
    <div id="composeErr"></div>
    <div id="aiDisclosure">✨ AI drafts &amp; summaries send this message's text to OpenRouter.</div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
