name: Refresh Mail Brief

on:
  schedule:
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth pywebpush

      - name: Write notification key
        env:
          VAPID_PEM: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          printf '%s' "$VAPID_PEM" > "$RUNNER_TEMP/vapid.pem"
          echo "VAPID_PEM_PATH=$RUNNER_TEMP/vapid.pem" >> "$GITHUB_ENV"

      - name: Fetch, classify, publish
        env:
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
          MAIL_ACCOUNT_1: ${{ secrets.MAIL_ACCOUNT_1 }}
          MAIL_ACCOUNT_2: ${{ secrets.MAIL_ACCOUNT_2 }}
          MAIL_ACCOUNT_3: ${{ secrets.MAIL_ACCOUNT_3 }}
          MAIL_ACCOUNT_4: ${{ secrets.MAIL_ACCOUNT_4 }}
          MAIL_ACCOUNT_5: ${{ secrets.MAIL_ACCOUNT_5 }}
          MAIL_ACCOUNT_6: ${{ secrets.MAIL_ACCOUNT_6 }}
          MAILBRIEF_ACCESS_KEY: ${{ secrets.MAILBRIEF_ACCESS_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CAL_ICAL_URL: ${{ secrets.CAL_ICAL_URL }}
        run: python pipeline/refresh_mail.py
