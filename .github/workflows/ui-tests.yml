name: UI Tests

on:
  push:
    branches: [main]
    paths: ['public/**', 'e2e/**']
  pull_request:
    paths: ['public/**', 'e2e/**']
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e
        run: npm install

      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        working-directory: e2e
        run: npm test
