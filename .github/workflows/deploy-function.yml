name: Deploy Reply Function

on:
  push:
    branches: [main]
    paths: ['functions/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Authenticate gcloud
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/firebase-sa.json"

      - name: Build env file from secrets
        env:
          MAILBRIEF_ACCESS_KEY: ${{ secrets.MAILBRIEF_ACCESS_KEY }}
          MAIL_ACCOUNT_1: ${{ secrets.MAIL_ACCOUNT_1 }}
          MAIL_ACCOUNT_2: ${{ secrets.MAIL_ACCOUNT_2 }}
          MAIL_ACCOUNT_3: ${{ secrets.MAIL_ACCOUNT_3 }}
          MAIL_ACCOUNT_4: ${{ secrets.MAIL_ACCOUNT_4 }}
          MAIL_ACCOUNT_5: ${{ secrets.MAIL_ACCOUNT_5 }}
          MAIL_ACCOUNT_6: ${{ secrets.MAIL_ACCOUNT_6 }}
        run: |
          python3 - <<'EOF'
          import json, os
          keys = ["MAILBRIEF_ACCESS_KEY"] + [f"MAIL_ACCOUNT_{n}" for n in range(1, 7)]
          lines = [f"{k}: {json.dumps(v)}" for k in keys if (v := os.environ.get(k))]
          path = os.path.join(os.environ["RUNNER_TEMP"], "env.yaml")
          with open(path, "w") as f:
              f.write("\n".join(lines) + "\n")
          print(f"env.yaml written with {len(lines)} entries")
          EOF

      - name: Deploy sendReply function
        run: |
          gcloud functions deploy sendReply \
            --gen2 \
            --project=mail-brief-gio \
            --region=us-central1 \
            --runtime=nodejs20 \
            --source=functions \
            --entry-point=sendReply \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256Mi \
            --max-instances=2 \
            --env-vars-file="$RUNNER_TEMP/env.yaml" \
            --quiet
